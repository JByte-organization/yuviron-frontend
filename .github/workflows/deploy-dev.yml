name: Deploy frontend dev

on:
  push:
    branches: [dev]

concurrency:
  group: deploy-frontend-dev
  cancel-in-progress: true

jobs:
  detect-affected:
    runs-on: [self-hosted, yuviron]

    outputs:
      apps: ${{ steps.affected.outputs.apps }}
      has_apps: ${{ steps.affected.outputs.has_apps }}

    steps:
      - name: Sync frontend source
        run: |
          set -Eeuo pipefail
          cd /opt/yuviron-server/src/yuviron-frontend
          git fetch origin dev
          git reset --hard origin/dev
          git clean -fdx

      - name: Detect affected apps
        id: affected
        run: |
          set -Eeuo pipefail
          cd /opt/yuviron-server/src/yuviron-frontend

          APPS=$(bash .github/scripts/get-affected-apps.sh | tail -n 1)

          echo "apps=$APPS" >> "$GITHUB_OUTPUT"

          if [ "$APPS" = "[]" ]; then
            echo "has_apps=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_apps=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Print affected apps
        run: |
          echo "Affected apps:"
          echo "${{ steps.affected.outputs.apps }}"

  deploy:
    needs: detect-affected
    if: needs.detect-affected.outputs.has_apps == 'true'
    runs-on: [self-hosted, yuviron]

    steps:
      - name: Sync frontend source
        run: |
          set -Eeuo pipefail
          cd /opt/yuviron-server/src/yuviron-frontend
          git fetch origin dev
          git reset --hard origin/dev
          git clean -fdx

      - name: Preflight check
        run: |
          set -Eeuo pipefail
          cd /opt/yuviron-server
          chmod +x ./scripts/preflight-check.sh
          ./scripts/preflight-check.sh dev /opt/yuviron-server

      - name: Validate frontend source
        run: |
          set -Eeuo pipefail
          cd /opt/yuviron-server/src/yuviron-frontend
          chmod +x ./scripts/check-frontend-full.sh
          ./scripts/check-frontend-full.sh

      - name: Build affected frontend services
        env:
          AFFECTED_APPS: ${{ needs.detect-affected.outputs.apps }}
        run: |
          set -Eeuo pipefail
          cd /opt/yuviron-server

          SERVICES=$(python3 - <<'PY'
          import json, os
          apps = json.loads(os.environ["AFFECTED_APPS"])
          allowed = {"admin", "backoffice", "client-app"}
          services = [app for app in apps if app in allowed]
          print(" ".join(services))
          PY
          )

          if [ -z "$SERVICES" ]; then
            echo "No deployable frontend services affected."
            exit 0
          fi

          echo "Building services: $SERVICES"

          docker compose \
            -p yuviron-dev \
            -f ./infra/compose.base.yml \
            -f ./infra/compose.dev.yml \
            build $SERVICES

      - name: Restart affected frontend services
        env:
          AFFECTED_APPS: ${{ needs.detect-affected.outputs.apps }}
        run: |
          set -Eeuo pipefail
          cd /opt/yuviron-server

          SERVICES=$(python3 - <<'PY'
          import json, os
          apps = json.loads(os.environ["AFFECTED_APPS"])
          allowed = {"admin", "backoffice", "client-app"}
          services = [app for app in apps if app in allowed]
          print(" ".join(services))
          PY
          )

          if [ -z "$SERVICES" ]; then
            echo "No deployable frontend services affected."
            exit 0
          fi

          echo "Restarting services: $SERVICES"

          docker compose \
            -p yuviron-dev \
            -f ./infra/compose.base.yml \
            -f ./infra/compose.dev.yml \
            up -d --no-deps $SERVICES

      - name: Show running services
        run: |
          set -Eeuo pipefail
          cd /opt/yuviron-server
          docker compose \
            -p yuviron-dev \
            -f ./infra/compose.base.yml \
            -f ./infra/compose.dev.yml \
            ps

  skip-deploy:
    needs: detect-affected
    if: needs.detect-affected.outputs.has_apps != 'true'
    runs-on: [self-hosted, yuviron]

    steps:
      - name: Nothing to deploy
        run: |
          echo "No affected frontend apps detected. Skipping deploy."