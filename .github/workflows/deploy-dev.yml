name: Deploy frontend

on:
  push:
    branches: [dev]

concurrency:
  group: deploy-frontend-dev
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: [self-hosted, yuviron]

    steps:
      - name: Update frontend source
        run: |
          set -e
          cd /opt/yuviron/src/yuviron-frontend
          git fetch origin dev
          git reset --hard origin/dev
          git clean -fd

      - name: Rebuild and restart frontend
        run: |
          set -e
          cd /opt/yuviron/infra
          docker compose -f compose.dev.yml up -d --build --force-recreate yuviron-dev-frontend